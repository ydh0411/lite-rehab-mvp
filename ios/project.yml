name: LiteRehab
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "17.0"
packages:
  LiteRehabCore:
    path: LiteRehabCore
  Spezi:
    url: https://github.com/StanfordSpezi/Spezi.git
    exactVersion: 1.10.2
  SpeziViews:
    url: https://github.com/StanfordSpezi/SpeziViews.git
    exactVersion: 1.12.14
  SpeziOnboarding:
    url: https://github.com/StanfordSpezi/SpeziOnboarding.git
    exactVersion: 2.0.4
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_LANGUAGE: en
targets:
  LiteRehab:
    type: application
    platform: iOS
    sources:
      - path: LiteRehab
    info:
      path: LiteRehab/Resources/Info.plist
      properties:
        CFBundleDisplayName: LiteRehab
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: LiteRehab scans the QR code shown by your Mac to connect the app.
        NSLocalNetworkUsageDescription: LiteRehab connects to the local Mac running the rehabilitation demo.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.cuhk.literehab
        PRODUCT_NAME: LiteRehab
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: LiteRehabCore
      - package: Spezi
      - package: SpeziViews
      - package: SpeziOnboarding
        product: SpeziOnboarding
  LiteRehabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiteRehabTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.cuhk.literehab.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LiteRehab
  LiteRehabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LiteRehabUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: edu.cuhk.literehab.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LiteRehab
schemes:
  LiteRehab:
    build:
      targets:
        LiteRehab: all
        LiteRehabTests: [test]
        LiteRehabUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - LiteRehabTests
        - LiteRehabUITests
